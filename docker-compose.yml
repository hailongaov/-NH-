version: "3.9"

services:
  app:
    build: .
    container_name: ipa-scanner
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    expose:
      - "5000"
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: ipa-scanner-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/ssl:/etc/nginx/ssl:ro          # đặt cert.pem + key.pem vào đây
    depends_on:
      - app
    networks:
      - web

networks:
  web:
    driver: bridge
