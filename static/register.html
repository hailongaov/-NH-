<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký — IPA Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
<style>
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#44445a;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:#0d0d20;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:13px;font-size:14px;font-weight:600;color:#e8e8f8;cursor:pointer;font-family:inherit;transition:.2s;margin-bottom:8px;text-decoration:none}
.btn-google:hover{background:#12122a;border-color:rgba(99,102,241,.4)}
.btn-google img{width:18px;height:18px}
.login-sub a{color:#6366f1;text-decoration:none}
.login-sub a:hover{text-decoration:underline}
.terms{font-size:11px;color:#44445a;text-align:center;margin-top:12px;line-height:1.6}
</style>
</head>
<body>
<div class="login-wrap">
    <div class="login-card">
        <div class="login-logo">
            <span class="logo-icon">📦</span>
            <span>IPA <strong>Scanner</strong></span>
        </div>
        <h2>Tạo tài khoản</h2>
        <p class="login-sub">Đã có tài khoản? <a href="/login">Đăng nhập</a></p>

        <div id="errorBox" class="error-box" style="display:none"></div>

        <a href="/auth/google" class="btn-google" id="btnGoogle">
            <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
            Đăng ký với Google
        </a>

        <div class="divider">hoặc đăng ký bằng email</div>

        <div class="field">
            <label>Tên đăng nhập *</label>
            <input type="text" id="username" placeholder="vd: johndoe" autocomplete="username" oninput="clearErr()">
        </div>
        <div class="field">
            <label>Email (tuỳ chọn)</label>
            <input type="email" id="email" placeholder="email@example.com" autocomplete="email" oninput="clearErr()">
        </div>
        <div class="field">
            <label>Mật khẩu *</label>
            <div class="pw-wrap">
                <input type="password" id="password" placeholder="Ít nhất 6 ký tự" autocomplete="new-password" oninput="clearErr()">
                <button class="eye-btn" onclick="togglePw(this)" type="button">👁</button>
            </div>
        </div>
        <div class="field">
            <label>Xác nhận mật khẩu *</label>
            <div class="pw-wrap">
                <input type="password" id="password2" placeholder="Nhập lại mật khẩu" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()" oninput="clearErr()">
                <button class="eye-btn" onclick="togglePw2(this)" type="button">👁</button>
            </div>
        </div>

        <button class="btn-login" onclick="doRegister()" id="regBtn">✅ Tạo tài khoản</button>
        <p class="terms">Bằng cách đăng ký, bạn đồng ý với điều khoản sử dụng dịch vụ.</p>
        <a href="/" class="back-link" style="margin-top:14px">← Về trang chủ</a>
    </div>
</div>
<script>
// Hide Google button if OAuth not configured
fetch('/api/auth/google_enabled').then(r => r.json()).then(d => {
    if (!d.enabled) document.getElementById('btnGoogle').style.display = 'none';
}).catch(() => { document.getElementById('btnGoogle').style.display = 'none'; });

// Redirect if already logged in
fetch('/api/auth/me', { credentials: 'include' }).then(r => r.json()).then(d => {
    if (d.logged_in) window.location.href = d.user.is_admin ? '/admin' : '/scan';
});

async function doRegister() {
    const btn = document.getElementById('regBtn');
    const err = document.getElementById('errorBox');
    const username  = document.getElementById('username').value.trim();
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    if (!username || !password) { showErr('Vui lòng nhập username và mật khẩu'); return; }
    if (password !== password2)  { showErr('Mật khẩu xác nhận không khớp'); return; }

    btn.disabled = true;
    btn.textContent = '⏳ Đang xử lý...';
    err.style.display = 'none';
    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password }),
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = '/scan';
        } else {
            showErr(data.error || 'Đăng ký thất bại');
        }
    } catch { showErr('Lỗi kết nối server'); }
    finally { btn.disabled = false; btn.textContent = '✅ Tạo tài khoản'; }
}

function showErr(msg) {
    const e = document.getElementById('errorBox');
    e.textContent = '⚠️ ' + msg;
    e.style.display = 'block';
}
function clearErr() { document.getElementById('errorBox').style.display = 'none'; }
function togglePw(btn) {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}
function togglePw2(btn) {
    const inp = document.getElementById('password2');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}
</script>
</body>
</html>
